<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="72" fill="url(#bgGrad)" />

  <!-- Fretboard grid + dots rotated around center -->
  <g transform="rotate(-5, 256, 256)">

    <!-- Fretboard grid: 3 strings, 2 frets -->
    <g stroke="white" stroke-width="32" stroke-linecap="round" opacity="0.9">
      <!-- Vertical strings -->
      <line x1="164" y1="80" x2="164" y2="432" />
      <line x1="256" y1="80" x2="256" y2="432" />
      <line x1="348" y1="80" x2="348" y2="432" />

      <!-- Horizontal frets -->
      <line x1="96" y1="197" x2="416" y2="197" />
      <line x1="96" y1="315" x2="416" y2="315" />
    </g>

    <!-- Note markers: large, diagonal across fret zones -->
    <circle cx="164" cy="139" r="36" fill="#a78bfa" stroke="white" stroke-width="4" />
    <circle cx="256" cy="256" r="36" fill="#34d399" stroke="white" stroke-width="4" />
    <circle cx="348" cy="373" r="36" fill="#fbbf24" stroke="white" stroke-width="4" />

  </g>
</svg>
